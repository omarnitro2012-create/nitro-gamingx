<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NITRO GAMING | Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000;
            color: #ff4d4d;
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        @keyframes colorPulse {
            0%,
            100% {
                color: #ff4d4d;
                text-shadow: 0 0 15px rgba(255, 77, 77, 0.9);
            }
            50% {
                color: #500000;
                text-shadow: 0 0 5px rgba(255, 77, 77, 0.2);
            }
        }
        
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes floatUpDown {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }
        
        #landing {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            position: relative;
            z-index: 10;
        }
        
        .center-section {
            text-align: center;
            transform: translateY(-20px);
        }
        
        .nx-logo {
            font-size: 4.2rem;
            letter-spacing: 18px;
            font-weight: bold;
            color: #ff4d4d;
            text-shadow: 0 0 15px rgba(255, 77, 77, 0.9);
            animation: fadeInUp 1s forwards, colorPulse 3s infinite;
            opacity: 0;
        }
        
        .typewriter-box {
            height: 30px;
            margin-top: 15px;
            color: #ff4d4d;
            font-size: 1.1rem;
            letter-spacing: 6px;
            animation: fadeInUp 1s forwards 0.5s;
            opacity: 0;
        }
        
        .btn-wrapper {
            position: absolute;
            bottom: 60px;
            animation: fadeInUp 1s forwards 1.2s;
            opacity: 0;
            cursor: pointer;
            text-align: center;
        }
        
        .enter-btn {
            background: #0a0a0a;
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
            padding: 18px 85px;
            border-radius: 50px;
            font-size: 1.3rem;
            letter-spacing: 6px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.4s;
        }
        
        .btn-wrapper:hover .enter-btn {
            box-shadow: 0 0 40px rgba(255, 77, 77, 0.6);
            background: #1a0000;
        }
        
        .press-hint {
            color: #ff4d4d;
            font-size: 0.75rem;
            margin-top: 20px;
            letter-spacing: 5px;
            animation: colorPulse 2s infinite;
        }
        
        #main-content {
            display: none;
            width: 650px;
        }
        
        .nx-card {
            background: #050505;
            border: 1px solid #200000;
            border-radius: 30px;
            padding: 70px 20px;
            text-align: center;
            box-shadow: 0 10px 60px rgba(0, 0, 0, 0.9);
            animation: floatUpDown 4s infinite ease-in-out;
        }
        
        #clock {
            font-size: 4.5rem;
            color: #ff4d4d;
            margin-bottom: 15px;
            animation: colorPulse 4s infinite;
        }
        
        #date {
            font-size: 1rem;
            color: #ffffff;
            margin-bottom: 50px;
            letter-spacing: 3px;
            opacity: 0.9;
        }
        
        .social-row {
            display: flex;
            gap: 22px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .icon-box {
            width: 60px;
            height: 60px;
            background: #0f0f0f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            font-size: 1.8rem;
            border: 1px solid #222;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0.7;
        }
        
        .youtube:hover {
            color: #FF0000 !important;
            border-color: #FF0000 !important;
            transform: rotate(360deg) scale(1.2);
            opacity: 1;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
        }

        .facebook:hover {
            color: #1877F2 !important;
            border-color: #1877F2 !important;
            transform: rotate(360deg) scale(1.2);
            opacity: 1;
            box-shadow: 0 0 15px rgba(24, 119, 242, 0.4);
        }

        .discord:hover {
            color: #5865F2 !important;
            border-color: #5865F2 !important;
            transform: rotate(360deg) scale(1.2);
            opacity: 1;
            box-shadow: 0 0 15px rgba(88, 101, 242, 0.4);
        }
        
        .tiktok:hover {
            color: #fff !important;
            border-color: #ff0050 !important;
            text-shadow: 2px 0 #ff0050, -2px 0 #00f2ea;
            box-shadow: 0 0 15px rgba(255, 0, 80, 0.5);
            transform: rotate(360deg) scale(1.2);
            opacity: 1;
        }
        
        .instagram:hover {
            color: #E1306C !important;
            border-color: #E1306C !important;
            transform: rotate(360deg) scale(1.2);
            opacity: 1;
            box-shadow: 0 0 15px rgba(225, 48, 108, 0.4);
        }
        
        #mute-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 55px;
            height: 55px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ff4d4d;
            border-radius: 50%;
            color: #ff4d4d;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
        }
        
        .fade-out {
            opacity: 0;
            filter: blur(20px);
            transition: 0.8s;
        }
    </style>
</head>

<body>

    <!-- مشغل صوت مباشر ومضمون للأغنية المطلوبة وبيلف علطول -->
    <audio id="audio-player" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div id="landing">
        <div class="center-section">
            <div class="nx-logo">NITRO GAMING</div>
            <div class="typewriter-box">
                <span id="text-target"></span><span style="color:#ff4d4d; animation: blink 0.6s infinite;">|</span>
            </div>
        </div>

        <div class="btn-wrapper" onclick="start()">
            <button class="enter-btn"><i class="fa-solid fa-arrow-right-to-bracket"></i> ENTER</button>
            <div class="press-hint">PRESS TO ENTER</div>
        </div>
    </div>

    <div id="main-content">
        <div class="nx-card">
            <div id="clock">00:00:00 PM</div>
            <div id="date">LOADING...</div>
            <div class="social-row">
                <a href="https://www.youtube.com/channel/UCTzGua-KzO8C1P9EyTmQ-4w" target="_blank" class="icon-box youtube"><i class="fa-brands fa-youtube"></i></a>
                <a href="https://www.facebook.com/profile.php?id=61591571431329" target="_blank" class="icon-box facebook"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="https://discord.gg/4FS9eaBvfG" target="_blank" class="icon-box discord"><i class="fa-brands fa-discord"></i></a>
                <a href="https://www.tiktok.com/@xomerpubgm" target="_blank" class="icon-box tiktok"><i class="fa-brands fa-tiktok"></i></a>
                <a href="https://www.instagram.com/initrogamingz" target="_blank" class="icon-box instagram"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>
    </div>

    <div id="mute-btn" onclick="toggleAudio()">
        <i id="mute-icon" class="fa-solid fa-volume-high"></i>
    </div>

    <script>
        const myAudio = document.getElementById('audio-player');
        myAudio.volume = 0.8; // ضبط الصوت على 80% عشان الباس عالي

        const words = ["CONTENT CREATOR", "PUBG MOBILE", "xomerpubgm", "NITRO ON TOP"];
        let wordIdx = 0;
        const target = document.getElementById("text-target");

        function scrambleShow() {
            const finalWord = words[wordIdx];
            let iteration = 0;
            const interval = setInterval(() => {
                target.innerText = finalWord.split("").map((l, i) => i < iteration ? finalWord[i] : "!?&#" [Math.floor(Math.random() * 4)]).join("");
                if (iteration >= finalWord.length) {
                    clearInterval(interval);
                    setTimeout(deleteText, 1800);
                }
                iteration += 1 / 3;
            }, 40);
        }

        function deleteText() {
            let txt = target.innerText;
            if (txt.length > 0) {
                target.innerText = txt.substring(0, txt.length - 1);
                setTimeout(deleteText, 30);
            } else {
                wordIdx = (wordIdx + 1) % words.length;
                setTimeout(scrambleShow, 100);
            }
        }

        function start() {
            // تشغيل تراك جيو بيكا فوراً عند الدخول
            myAudio.play().catch(err => console.log("Audio play deferred: ", err));

            const landing = document.getElementById('landing');
            landing.classList.add('fade-out');
            setTimeout(() => {
                landing.style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('main-content').style.animation = 'fadeInUp 1s forwards';
                document.getElementById('mute-btn').style.display = 'flex';
            }, 800);
        }

        // تحويل الزرار ليقوم بعمل Mute/Unmute كامل وتشغيل وإيقاف الأيقونة
        function toggleAudio() {
            const icon = document.getElementById('mute-icon');
            if (myAudio.paused) {
                myAudio.play();
                icon.className = 'fa-solid fa-volume-high';
            } else {
                myAudio.pause();
                icon.className = 'fa-solid fa-volume-xmark';
            }
        }

        function updateClock() {
            const now = new Date();
            let h = now.getHours(),
                m = now.getMinutes(),
                s = now.getSeconds();
            let ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            m = m < 10 ? '0' + m : m;
            s = s < 10 ? '0' + s : s;
            document.getElementById('clock').innerText = `${h}:${m}:${s} ${ampm}`;
            document.getElementById('date').innerText = now.toLocaleDateString('en-US', {
                weekday: 'short',
                month: 'short',
                day: '2-digit',
                year: 'numeric'
            }).toUpperCase();
        }

        setInterval(updateClock, 1000);
        updateClock();
        scrambleShow();
    </script>
</body>

</html>
